{% block content %}

<!-- Warehouse Stocktake Modal -->
<div class="modal fade" id="stocktakeModal" tabindex="-1" aria-labelledby="stocktakeModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-md"> <!-- wider for better layout -->
    <div class="modal-content stocktake-theme">
      <form method="POST" action="/warehouse/{{ warehouse.id if warehouse else 0 }}/stocktake">
        
        <!-- Header -->
        <div class="modal-header bg-success text-white">
          <h5 class="modal-title" id="stocktakeModalLabel">
            🟩 Crates Stocktake - {{ warehouse.name if warehouse else '' }}
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        
        <!-- Body -->
        <div class="modal-body">
          <div class="mb-3">
            <label for="good_crates" class="form-label">Good Crates (usable)</label>
            <input type="number" name="good_crates" min="0" class="form-control text-center"
                   value="{{ warehouse.good_crates if warehouse else 0 }}">
          </div>

          <div class="mb-3">
            <label for="worn_crates" class="form-label">Worn-out but usable Crates</label>
            <input type="number" name="worn_crates" min="0" class="form-control text-center readonly-highlight"
                   value="{{ warehouse.worn_crates if warehouse else 0 }}" readonly>
          </div>

          <div class="mb-3">
            <label for="disposed_crates" class="form-label">Crates to Dispose</label>
            <input type="number" name="disposed_crates" min="0" class="form-control text-center readonly-highlight"
                   value="{{ warehouse.disposed_crates if warehouse else 0 }}" readonly>
          </div>

          <div class="mb-3">
            <label for="stocktake_by" class="form-label">Stocktake by</label>
            <select name="staff_name" class="form-select text-center" required>
              <option value="" selected>-- Select Staff --</option>
              {% for u in users %}
                <option value="{{ u }}">{{ u }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label for="description" class="form-label">Notes / Description</label>
            <textarea name="description" rows="3" class="form-control"></textarea>
          </div>
        </div>
        
        <!-- Footer -->
        <div class="modal-footer bg-light">
          <button type="submit" class="btn btn-success">✅ Submit Stocktake</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">❌ Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div id="errorPanel" class="alert alert-danger d-none"></div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const stocktakeForm = document.querySelector("#stocktakeModal form");
  if (stocktakeForm) {
    stocktakeForm.addEventListener("submit", function(e) {
      e.preventDefault();

      // Collect values
      const good = parseInt(stocktakeForm.querySelector("[name=good_crates]").value) || 0;
      const worn = parseInt(stocktakeForm.querySelector("[name=worn_crates]").value) || 0;
      const disposed = parseInt(stocktakeForm.querySelector("[name=disposed_crates]").value) || 0;
      const total = good + worn + disposed;
      const staff = stocktakeForm.querySelector("[name=staff_name]").value || "-- not selected --";
      const notes = stocktakeForm.querySelector("[name=description]").value || "-- none --";

      // Build confirmation message
      const message = 
        "You are about to post this stocktake:\n\n" +
        "• Good Crates: " + good + "\n" +
        "• Worn Crates: " + worn + "\n" +
        "• Disposed Crates: " + disposed + "\n" +
        "• TOTAL Crates: " + total + "\n" +
        "• Stocktake by: " + staff + "\n" +
        "• Notes: " + notes + "\n\n" +
        "Please confirm to proceed.";

      // Show confirmation
      if (confirm(message)) {
        // Busy cursor + disable submit button
        document.body.style.cursor = "wait";
        const btn = stocktakeForm.querySelector("button[type=submit]");
        if (btn) {
          btn.disabled = true;
          btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Posting...`;
        }
        // Submit form
        stocktakeForm.submit();
      } else {
        console.log("DEBUG: User cancelled stocktake submission");
      }
    });
  }
});
</script>


<style>
.stocktake-theme {
    background-color: #004d00; /* dark green */
    color: #fff;
  }
 
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const physicalInput = document.getElementById("physical_crates");
  const appInput = document.getElementById("app_collections");
  const varianceInput = document.getElementById("variance");

  function updateVariance() {
    const physical = parseInt(physicalInput.value) || 0;
    const app = parseInt(appInput.value) || 0;
    const variance = physical - app;

    varianceInput.value = variance;

    if (variance < 0) {
      varianceInput.classList.remove("text-success");
      varianceInput.classList.add("text-danger");
    } else {
      varianceInput.classList.remove("text-danger");
      varianceInput.classList.add("text-success");
    }
  }

  physicalInput.addEventListener("input", updateVariance);
  updateVariance();
});
</script>


<!-- Bootstrap 5 bundle includes Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>



</body>

  <!-- Your dashboard rows, modals, etc. -->
{% endblock %}
