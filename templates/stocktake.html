{% block title %}Warehouse Stocktake{% endblock %}

{% block content %}

<!-- Warehouse Stocktake Modal -->
<div class="modal fade" id="stocktakeModal" tabindex="-1" aria-labelledby="stocktakeModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form method="POST" action="/warehouse/{{ warehouse.id if warehouse else 0 }}/stocktake">
        <div class="modal-header">
          <h5 class="modal-title" id="stocktakeModalLabel">
            Crates Stocktake - {{ warehouse.name if warehouse else '' }}
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <label for="good_crates">Good Crates (usable)</label>
          <input type="number" name="good_crates" min="0" class="form-control text-center"
                 value="{{ warehouse.good_crates if warehouse else 0 }}">

          <label for="worn_crates" class="mt-2">Worn-out but usable Crates</label>
          <input type="number" name="worn_crates" min="0" class="form-control text-center" readonly
                 value="{{ warehouse.worn_crates if warehouse else 0 }}">

          <label for="disposed_crates" class="mt-2">Crates to Dispose</label>
          <input type="number" name="disposed_crates" min="0" class="form-control text-center"
                 value="{{ warehouse.disposed_crates if warehouse else 0 }}" readonly>

          <label for="stocktake_by" class="mt-2">Stocktake by</label>
          <select name="staff_name" class="form-select mt-2 text-center" required>
          <option value="" selected>-- Select Staff --</option>
             {% for u in users %}
    	    <option value="{{ u }}">{{ u }}</option>
 	    {% endfor %}
          </select>
 


          <label for="description" class="mt-2">Notes / Description</label>
          <textarea name="description" rows="3" class="form-control"></textarea>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-success">Submit Stocktake</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>


<div id="errorPanel" class="alert alert-danger d-none"></div>





<style>
@media print {
  /* Hide modal chrome and buttons */
  .modal-header .btn,
  .modal-footer,
  .btn-close {
    display: none !important;
  }

  /* Remove modal background and borders */
  .modal-content {
    border: none !important;
    box-shadow: none !important;
  }

  .modal-dialog {
    max-width: 100% !important;
    margin: 0 !important;
  }

  /* Force A4 page size */
  @page {
    size: A4;
    margin: 20mm;
  }

  /* Page breaks between users for clarity */
  .card {
    page-break-inside: avoid;
    margin-bottom: 1rem;
  }

  /* Tables print cleanly */
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th, td {
    border: 1px solid #000;
    padding: 4px;
    text-align: left;
  }
}
</style>

<!-- Modal -->
<div class="modal fade" id="collectionsModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
    <div id="reportContainer">
      <div class="modal-header">
        <!--h5 class="modal-title">Collections Summary</h5-->
	<h5 class="modal-title">
    	Collections Summary for 
    	<input type="text" id="summaryDate" class="form-control d-inline-block w-auto ms-2" />
  	</h5>
 	<!--button id="printBtn" class="btn btn-sm btn-primary ms-3">Print</button-->
	<!--button id="displayuserssummary" class="btn btn-sm btn-primary ms-3">Retrieve User Summaries</button-->
<button id="openClosureReport" class="btn btn-sm btn-primary ms-3">
  End of Day Closure
</button>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
       </div>
     <div class="modal-body" id="collections_summary">
        <!-- JS will inject cards here -->
      </div>
    </div>
  </div>
</div>
</div>


<script>
document.addEventListener("DOMContentLoaded", function() {
  const physicalInput = document.getElementById("physical_crates");
  const appInput = document.getElementById("app_collections");
  const varianceInput = document.getElementById("variance");

  function updateVariance() {
    const physical = parseInt(physicalInput.value) || 0;
    const app = parseInt(appInput.value) || 0;
    const variance = physical - app;

    varianceInput.value = variance;

    if (variance < 0) {
      varianceInput.classList.remove("text-success");
      varianceInput.classList.add("text-danger");
    } else {
      varianceInput.classList.remove("text-danger");
      varianceInput.classList.add("text-success");
    }
  }

  physicalInput.addEventListener("input", updateVariance);
  updateVariance();
});
</script>

<!-- Bootstrap 5 bundle includes Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
