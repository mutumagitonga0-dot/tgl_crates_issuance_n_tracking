{% extends "layout.html" %}
{% block title %}Record Collection{% endblock %}

{% block content %}


<style>
  body {
  
/*background-color: #f28b82; /* soft red */
  /* or try one of these for soft blue tones */
  /* background-color: #add8e6;  light blue */
   background-color: #87cefa;  sky blue 
  /* background-color: #b0e0e6;  powder blue */
  }
</style>

<form method="post" class="card p-3"
      onsubmit="return confirmAndBusy(this,'Do you want to proceed collecting ' 
      + document.querySelector('[name=crates_collected]').value 
      + ' crates from outlet ' 
      + document.querySelector('[name=outlet_name]').value 
      + ' by staff ' 
      + document.querySelector('[name=staff_name]').value + '?',
      'submitBtn');">
   
  <input type="hidden" name="cancelled" value="false">

  <h2>Record Collection</h2>

  <div class="mb-3">
    <label class="form-label">Outlet</label>
    <select name="outlet_name" id="outletSelect" class="form-select" required>
      <option value="" selected>-- Select Outlet --</option>
      {% for o in outlets %}
        <option value="{{ o }}">{{ o }}</option>
      {% endfor %}
    </select>
  </div>

<!-- Placeholder for inventory results -->
<!--div id="inventoryResult" class="highlight-label"></div-->
<div id="inventoryResult" class="highlight-label" data-process-type="collection"></div>


  <div class="mb-3">
    <label class="form-label">Crates Collected Here</label>
    <input type="number" name="crates_collected" class="form-control" required>
  </div>


  <!--div class="mb-3">
    <label class="form-label">Collected By (Staff Name)</label>
    <select name="staff_name" class="form-select" required>
      <option value="" selected>-- Select Staff --</option>
      {% for u in users %}
        <option value="{{ u }}">{{ u }}</option>
      {% endfor %}
    </select>
  </div-->


  <button type="submit" class="btn btn-primary" id="submitBtn">Submit Collection</button>
</form>

<div class="card mt-3">
  <div class="card-header">Recent Collections</div>
  <div class="card-body p-0">
    <table class="table table-sm mb-0">
      <thead class="table-light">
        <tr>
          <th>Date/Time</th>
          <th>Crates</th>
          <th>Recorded By</th>
        </tr>
      </thead>
      <tbody id="recentCollections"></tbody>
    </table>
  </div>
</div>

<a href="{{ url_for('home') }}" class="btn btn-secondary mt-3">⬅️ Return to Home</a>
{% endblock %}
