<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Warehouse Dashboard</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

  <!-- Row with Outlet Summary and End Day button -->
  <div class="row mb-3 align-items-center">
    <!-- Left column: heading -->
    <div class="col text-start">
      <h3 class="mb-0">Outlet Summary</h3>
    </div>

    <!-- Center column: button -->
    <div class="col text-center">
      <button class="btn btn-primary" 
        style="background-color:#00008B; border-color:#00008B;" 
        data-bs-toggle="modal" 
        data-bs-target="#endDayModal">
        Perform End Of Day
      </button>
    </div>

    <!-- Right column: empty -->
    <div class="col"></div>
  </div>

  <!-- Outlet Summary Table -->
  <table class="table table-bordered">
    <thead>
      <tr>
        <th>Outlet</th>
        <th>Dispatched</th>
        <th>Collected</th>
        <th>Variance</th>
      </tr>
    </thead>
    <tbody>
      {{ rows|safe }}
    </tbody>
  </table>

  <!-- End of Day Modal -->
  <div class="modal fade" id="endDayModal" tabindex="-1" aria-labelledby="endDayModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form method="POST" action="/warehouse/{{ warehouse.Whrsh_Outlets_id if warehouse else 0 }}/endday">
          <div class="modal-header">
            <h5 class="modal-title" id="endDayModalLabel">
              End of Day - {{ warehouse.name if warehouse else '' }}
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>

          <div class="modal-body">
            <!-- 1. Physical crates offloaded -->
            <label for="physical_crates">Physical Crates Offloaded</label>
            <input type="number" id="physical_crates" name="physical_crates" min="0" class="form-control" required>

            <!-- 2. App collection recordings -->
            <label for="app_collections" class="mt-2">App Collection Recordings</label>
            <input type="number" id="app_collections" name="app_collections" min="0" class="form-control"
                   value="{{ warehouse.collection_total if warehouse else 0 }}" readonly>

            <!-- 3. Variance -->
            <label for="variance" class="mt-2">Variance</label>
            <input type="number" id="variance" name="variance" class="form-control fw-bold text-center" readonly>

            <!-- 4. Remarks -->
            <label for="remarks" class="mt-2">Remarks</label>
            <textarea name="remarks" rows="3" class="form-control"></textarea>
          </div>

          <div class="modal-footer">
            <button type="submit" class="btn btn-success">Submit End of Day</button>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JavaScript for live variance calculation -->
  <script>
  document.addEventListener("DOMContentLoaded", function() {
    const physicalInput = document.getElementById("physical_crates");
    const appInput = document.getElementById("app_collections");
    const varianceInput = document.getElementById("variance");

    function updateVariance() {
      const physical = parseInt(physicalInput.value) || 0;
      const app = parseInt(appInput.value) || 0;
      const variance = physical - app;

      varianceInput.value = variance;

      if (variance < 0) {
        varianceInput.classList.remove("text-success");
        varianceInput.classList.add("text-danger");
      } else {
        varianceInput.classList.remove("text-danger");
        varianceInput.classList.add("text-success");
      }
    }

    physicalInput.addEventListener("input", updateVariance);
    updateVariance();
  });
  </script>

</body>
</html>
