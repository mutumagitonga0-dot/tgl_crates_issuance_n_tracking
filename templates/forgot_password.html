{% extends "layout.html" %}
{% block title %}Forgot Password{% endblock %}

{% block content %}

<h2 class="text-center text-dark blue mt-4">Welcome to Your Password Reset Page</h2>

<div class="homepage-banner">
  <img src="{{ url_for('static', filename='images/warehouse_monitoring.png') }}" 
       alt="Warehouse Monitoring" class="bg-image">

  <div class="overlay">
    <div class="reset-card">
      <h2>Forgot Password</h2>
      <p class="text-muted">Enter your username to receive a reset link.</p>
      <form method="POST" action="{{ url_for('forgot_password') }}">
        <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
        <button type="submit" class="btn btn-danger w-100">Send Reset Link</button>
      </form>
      <p class="mt-3">
        <a href="{{ url_for('login') }}">Back to Login</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
