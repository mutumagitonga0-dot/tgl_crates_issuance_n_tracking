{% extends "layout.html" %}
{% block title %}Record Dispatch{% endblock %}

{% block content %}

<form id="collectionsDispatchForm">
  <table class="table text-center align-middle" id="outletTable">
    <thead class="table-light">
      <tr>
        <th>#</th>
        <th>Select</th>
        <th>Outlet</th>
        <th>Total Dispatched</th>
        <th>Add Dispatch</th>
        <th>Total Collected</th>
        <th>Add Collection</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="row-number">1</td>
        <td><input type="checkbox" class="row-check" checked></td>
        <td>
          <select class="form-select outlet-select">
            <option value="">-- Choose outlet --</option>
            {% for outlet_id, outlet_name in outlets %}
              <option value="{{ outlet_id }}">{{ outlet_name }}</option>
            {% endfor %}
          </select>
        </td>
        <td class="total-dispatched">0</td>
        <td><input type="number" class="dispatch-add" /></td> <!-- flush red input -->
        <td class="total-collected">0</td>
        <td><input type="number" class="collection-add" /></td> <!-- flush blue input -->
      </tr>
    </tbody>
  </table>

  <button type="button" id="postAllBtn" class="btn btn-success mt-3">Post All</button>
</form>


<style>
#outletTable {
  border-collapse: collapse;
  width: 100%;
}

#outletTable td,
#outletTable th {
  border: 1px solid #000;
  padding: 1px;
}

/* Outlet select column flush with table cell */
#outletTable select.outlet-select {
  width: 100%;
  border: none;
  outline: none;
  padding: 6px;
  box-sizing: border-box;
  background-color: #fff8dc; /* light cream to highlight outlet */
}

/* Dispatch column → soft red */
#outletTable input.dispatch-add {
  width: 100%;
  border: none;
  outline: none;
  padding: 6px;
  box-sizing: border-box;
  background-color: #f28b82; /* soft red */
}

/* Collection column → sky blue */
#outletTable input.collection-add {
  width: 100%;
  border: none;
  outline: none;
  padding: 6px;
  box-sizing: border-box;
  background-color: #87cefa; /* sky blue */
}

</style>

<script>
  const outletSummary = {
    {% for summ in outlet_summ %}
      "{{ summ.outlet_id }}": {
        dispatched: {{ summ.dispatched }},
        collected: {{ summ.collected }}
      },
    {% endfor %}
  };
</script>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const tableBody = document.querySelector("#outletTable tbody");

  function attachRowHandlers(row) {
    const outletSelect = row.querySelector(".outlet-select");
    const dispatchedCell = row.querySelector(".total-dispatched");
    const collectedCell = row.querySelector(".total-collected");

    outletSelect.addEventListener("change", function() {
      const outletId = outletSelect.value;
      if (outletId && outletSummary[outletId]) {
        dispatchedCell.innerText = outletSummary[outletId].dispatched;
        collectedCell.innerText = outletSummary[outletId].collected;
      } else {
        dispatchedCell.innerText = 0;
        collectedCell.innerText = 0;
      }
    });
  }

  // Attach to initial row
  attachRowHandlers(tableBody.querySelector("tr"));
});
</script>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const tableBody = document.querySelector("#outletTable tbody");
  const postAllBtn = document.getElementById("postAllBtn");
  const optionsHtml = tableBody.querySelector(".outlet-select").innerHTML.replace(/<option[^>]*value=""[^>]*>.*<\/option>/, ""); 
  // 🔑 strip duplicate placeholder option

  function updateRowNumbers() {
    const rows = tableBody.querySelectorAll("tr");
    rows.forEach((row, index) => {
      row.querySelector(".row-number").innerText = index + 1;
    });
  }

  function attachRowHandlers(row) {
    const outletSelect = row.querySelector(".outlet-select");
    const dispatchInput = row.querySelector(".dispatch-add");
    const collectionInput = row.querySelector(".collection-add");

    // Initially disable inputs until outlet is chosen
    dispatchInput.disabled = true;
    collectionInput.disabled = true;

    function completeRow() {
      const outletId = outletSelect.value;

      // 🔑 Immediately update totals from outletSummary for THIS row
      if (outletId && outletSummary[outletId]) {
        row.querySelector(".total-dispatched").innerText = outletSummary[outletId].dispatched;
        row.querySelector(".total-collected").innerText = outletSummary[outletId].collected;
        console.log(`Fetched totals for outlet ${outletId}: dispatched=${outletSummary[outletId].dispatched}, collected=${outletSummary[outletId].collected}`);
      }

      // ✅ Mark row completed and add new row immediately
      if (outletId && !row.dataset.completed) {
        row.dataset.completed = "true";
        outletSelect.dataset.locked = "true";

        const newRow = document.createElement("tr");
        newRow.innerHTML = `
          <td class="row-number"></td>
          <td><input type="checkbox" class="row-check" checked></td>
          <td>
            <select class="form-select outlet-select">
              <option value="">-- Choose outlet --</option>
              ${optionsHtml}
            </select>
          </td>
          <td class="total-dispatched">0</td>
          <td><input type="number" class="dispatch-add" /></td>
          <td class="total-collected">0</td>
          <td><input type="number" class="collection-add" /></td>
        `;
        tableBody.appendChild(newRow);
        updateRowNumbers();
        attachRowHandlers(newRow);
      }
    }

    // Outlet selection handler
    outletSelect.addEventListener("change", function(e) {
      if (outletSelect.value) {
        dispatchInput.disabled = false;
        collectionInput.disabled = false;
        completeRow(); // 🔑 trigger totals + row completion immediately
      } else {
        dispatchInput.disabled = true;
        collectionInput.disabled = true;
        dispatchInput.value = "";
        collectionInput.value = "";
      }

      // Warn only if user changes outlet AFTER completion AND has entered values
      if (
        row.dataset.completed === "true" &&
        outletSelect.dataset.locked === "true" &&
        outletSelect.dataset.previousValue &&
        outletSelect.dataset.previousValue !== outletSelect.value
      ) {
        const hasUserValues =
          (parseInt(dispatchInput.value || 0) > 0) ||
          (parseInt(collectionInput.value || 0) > 0);

        if (hasUserValues) {
          const confirmReset = confirm("Changing outlet will reset Dispatch and Collection values to zero. Continue?");
          if (confirmReset) {
            dispatchInput.value = 0;
            collectionInput.value = 0;
            row.querySelector(".total-dispatched").innerText = 0;
            row.querySelector(".total-collected").innerText = 0;
            row.dataset.completed = "";
            outletSelect.dataset.locked = "";
          } else {
            e.preventDefault();
            outletSelect.value = outletSelect.dataset.previousValue;
          }
        }
      }
      outletSelect.dataset.previousValue = outletSelect.value;
    });

    // Keyboard navigation with Enter
    [outletSelect, dispatchInput, collectionInput].forEach((el, idx, arr) => {
      el.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
          e.preventDefault();
          const next = arr[idx + 1];
          if (next) {
            next.focus();
          } else {
            const nextRow = row.nextElementSibling;
            if (nextRow) {
              nextRow.querySelector(".outlet-select").focus();
            }
          }
        }
      });
    });
  }

  // 🔑 Attach handlers to the very first row when page loads
  attachRowHandlers(tableBody.querySelector("tr"));

  // Post All button
  postAllBtn.addEventListener("click", function() {
    const rows = tableBody.querySelectorAll("tr");
    rows.forEach(row => {
      const checkbox = row.querySelector(".row-check");
      if (!checkbox.checked) return;

      const outletSelect = row.querySelector(".outlet-select");
      const outletId = outletSelect.value;
      const dispatchVal = parseInt(row.querySelector(".dispatch-add").value || 0);
      const collectionVal = parseInt(row.querySelector(".collection-add").value || 0);

      if (outletId && (dispatchVal + collectionVal > 0)) {
        const payload = {
          outlet_id: outletId,
          dispatch_add: dispatchVal,
          collection_add: collectionVal
        };

        fetch("/warehouse/add_entry", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
          row.querySelector(".total-dispatched").innerText = data.total_dispatches;
          row.querySelector(".total-collected").innerText = data.total_collections;
        })
        .catch(err => {
          console.error("Error saving entry:", err);
          alert("Failed to save entry for outlet " + outletId);
        });
      }
    });
  });
});
</script>


<div id="summaryPanel">
  <h4>Completed Outlets</h4>
  <ul id="completedList"></ul>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const tableBody = document.querySelector("#outletTable tbody");
  const postAllBtn = document.getElementById("postAllBtn");
  const optionsHtml = tableBody.querySelector(".outlet-select").innerHTML.replace(/<option[^>]*value=""[^>]*>.*<\/option>/, "");

  let completedOutlets = [];

  function updateRowNumbers() {
    const rows = tableBody.querySelectorAll("tr");
    rows.forEach((row, index) => {
      row.querySelector(".row-number").innerText = index + 1;
    });
  }

  function refreshSummaryPanel() {
    const list = document.getElementById("completedList");
    list.innerHTML = "";
    completedOutlets.forEach(item => {
      const li = document.createElement("li");
      li.textContent = `Outlet ${item.id} | Dispatched: ${item.dispatched} | Collected: ${item.collected}`;
      list.appendChild(li);
    });
  }

  function attachRowHandlers(row) {
    const outletSelect = row.querySelector(".outlet-select");
    const dispatchInput = row.querySelector(".dispatch-add");
    const collectionInput = row.querySelector(".collection-add");

    dispatchInput.disabled = true;
    collectionInput.disabled = true;

    function markRowComplete() {
      const outletId = outletSelect.value;
      const dispatchVal = parseInt(dispatchInput.value || 0);
      const collectionVal = parseInt(collectionInput.value || 0);

      // ✅ Rule: outlet selected AND (dispatch+collection) > 0
      if (outletId && outletId !== "" && (dispatchVal + collectionVal) > 0 && !row.dataset.completed) {
        row.dataset.completed = "true";
        outletSelect.dataset.locked = "true";

        outletSelect.dataset.previousValue = outletId;
        outletSelect.dataset.prevDispatched = row.querySelector(".total-dispatched").innerText;
        outletSelect.dataset.prevCollected = row.querySelector(".total-collected").innerText;

        completedOutlets.push({
          id: outletId,
          dispatched: row.querySelector(".total-dispatched").innerText,
          collected: row.querySelector(".total-collected").innerText
        });
        refreshSummaryPanel();

        // Append new row
        const newRow = document.createElement("tr");
        newRow.innerHTML = `
          <td class="row-number"></td>
          <td><input type="checkbox" class="row-check" checked></td>
          <td>
            <select class="form-select outlet-select">
              <option value="">-- Choose outlet --</option>
              ${optionsHtml}
            </select>
          </td>
          <td class="total-dispatched">0</td>
          <td><input type="number" class="dispatch-add" /></td>
          <td class="total-collected">0</td>
          <td><input type="number" class="collection-add" /></td>
        `;
        tableBody.appendChild(newRow);
        updateRowNumbers();
        attachRowHandlers(newRow);
      }
    }

    outletSelect.addEventListener("change", function(e) {
      const newOutlet = outletSelect.value;
      const prevOutlet = outletSelect.dataset.previousValue;
      const prevDispatched = outletSelect.dataset.prevDispatched || row.querySelector(".total-dispatched").innerText;
      const prevCollected = outletSelect.dataset.prevCollected || row.querySelector(".total-collected").innerText;

      // ✅ Cancel logic applies to ALL rows
      if (outletSelect.dataset.locked === "true" && prevOutlet && newOutlet !== prevOutlet) {
        const proceed = confirm(`You are changing a recorded outlet. Do you want to continue?`);
        if (!proceed) {
          outletSelect.value = prevOutlet;
          row.querySelector(".total-dispatched").innerText = prevDispatched;
          row.querySelector(".total-collected").innerText = prevCollected;
          return;
        }
      }

      if (newOutlet) {
        dispatchInput.disabled = false;
        collectionInput.disabled = false;
        if (outletSummary[newOutlet]) {
          row.querySelector(".total-dispatched").innerText = outletSummary[newOutlet].dispatched;
          row.querySelector(".total-collected").innerText = outletSummary[newOutlet].collected;
        }
      } else {
        dispatchInput.disabled = true;
        collectionInput.disabled = true;
        dispatchInput.value = "";
        collectionInput.value = "";
      }

      outletSelect.dataset.previousValue = newOutlet;
      outletSelect.dataset.prevDispatched = row.querySelector(".total-dispatched").innerText;
      outletSelect.dataset.prevCollected = row.querySelector(".total-collected").innerText;
    });

    // ✅ Mouse users: blur triggers completion
    dispatchInput.addEventListener("blur", markRowComplete);
    collectionInput.addEventListener("blur", markRowComplete);

    // ✅ Keyboard users: Enter/Arrow triggers completion before moving focus
    [outletSelect, dispatchInput, collectionInput].forEach((el, idx, arr) => {
      el.addEventListener("keydown", function(e) {
        if (e.key === "Enter" || e.key === "ArrowRight" || e.key === "ArrowDown") {
          e.preventDefault();
          markRowComplete(); // ensure row is completed before moving focus

          const next = arr[idx + 1];
          if (next) {
            next.focus();
          } else {
            const nextRow = row.nextElementSibling;
            if (nextRow) {
              nextRow.querySelector(".outlet-select").focus();
            }
          }
        }
      });
    });
  }

  attachRowHandlers(tableBody.querySelector("tr"));

  postAllBtn.addEventListener("click", function() {
    const rows = tableBody.querySelectorAll("tr");
    rows.forEach(row => {
      const checkbox = row.querySelector(".row-check");
      if (!checkbox.checked) return;

      const outletSelect = row.querySelector(".outlet-select");
      const outletId = outletSelect.value;
      const dispatchVal = parseInt(row.querySelector(".dispatch-add").value || 0);
      const collectionVal = parseInt(row.querySelector(".collection-add").value || 0);

      if (outletId && (dispatchVal + collectionVal) > 0) {
        const payload = {
          outlet_id: outletId,
          dispatch_add: dispatchVal,
          collection_add: collectionVal
        };

        fetch("/warehouse/add_entry", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
          row.querySelector(".total-dispatched").innerText = data.total_dispatches;
          row.querySelector(".total-collected").innerText = data.total_collections;

          const entry = completedOutlets.find(o => o.id === outletId);
          if (entry) {
            entry.dispatched = data.total_dispatches;
            entry.collected = data.total_collections;
            refreshSummaryPanel();
          }
        })
        .catch(err => {
          console.error("Error saving entry:", err);
          alert("Failed to save entry for outlet " + outletId);
        });
      }
    });
  });
});
</script>


<a href="{{ url_for('home') }}" class="btn btn-secondary mt-3">⬅️ Return to Home</a>


{% endblock %}
