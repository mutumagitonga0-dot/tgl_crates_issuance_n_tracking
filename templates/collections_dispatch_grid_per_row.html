{% extends "layout.html" %}
{% block title %}Record Dispatch{% endblock %}

{% block content %}

<form id="collectionsDispatchForm">
  <table class="table text-center align-middle" id="outletTable">
    <thead class="table-light">
      <tr>
        <th>#</th>
        <th>Select</th>
        <th>Outlet</th>
        <th>Total Dispatched</th>
        <th>Add Dispatch</th>
        <th>Total Collected</th>
        <th>Add Collection</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="row-number">1</td>
        <td><input type="checkbox" class="row-check" checked></td>
        <td>
          <select class="form-select outlet-select">
            <option value="">-- Choose outlet --</option>
            {% for outlet_id, outlet_name in outlets %}
              <option value="{{ outlet_id }}">{{ outlet_name }}</option>
            {% endfor %}
          </select>
        </td>
        <td class="total-dispatched">0</td>
        <td><input type="number" class="dispatch-add" /></td>
        <td class="total-collected">0</td>
        <td><input type="number" class="collection-add" /></td>
        <td><button type="button" id="addBtn" class="btn btn-primary btn-sm">Add</button></td>
      </tr>
    </tbody>
  </table>
</form>

<div id="summaryPanel" class="mt-3">
  <h4>Completed Outlets</h4>
  <table class="table text-center align-middle table-striped" id="completedTable">
    <thead class="table-light">
      <tr>
        <th>#</th>
        <th>Outlet</th>
        <th>Total Dispatched</th>
        <th>Total Collected</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="completedBody"></tbody>
  </table>
</div>

<div class="text-center mt-4">
  <button type="button" id="postAllBtn" class="btn btn-success btn-lg">Post All</button>
</div>

<style>
#outletTable, #completedTable {
  border-collapse: collapse;
  width: 100%;
}
#outletTable td, #outletTable th,
#completedTable td, #completedTable th {
  border: 1px solid #000;
  padding: 4px;
}
#outletTable select.outlet-select {
  width: 100%;
  border: none;
  outline: none;
  padding: 6px;
  background-color: #fff8dc;
}
#outletTable input.dispatch-add {
  width: 100%;
  border: none;
  outline: none;
  padding: 6px;
  background-color: #f28b82;
}
#outletTable input.collection-add {
  width: 100%;
  border: none;
  outline: none;
  padding: 6px;
  background-color: #87cefa;
}
#completedTable tbody tr {
  background-color: #f0f0f0;
}
</style>

<script>
  const outletSummary = {
    {% for summ in outlet_summ %}
      "{{ summ.outlet_id }}": {
        dispatched: {{ summ.dispatched }},
        collected: {{ summ.collected }}
      },
    {% endfor %}
  };
</script>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const tableBody = document.querySelector("#outletTable tbody");
  const postAllBtn = document.getElementById("postAllBtn");
  let completedOutlets = [];

  // Update totals when outlet changes
  const outletSelect = tableBody.querySelector(".outlet-select");
  const dispatchedCell = tableBody.querySelector(".total-dispatched");
  const collectedCell = tableBody.querySelector(".total-collected");
  outletSelect.addEventListener("change", function() {
    const outletId = outletSelect.value;
    if (outletId && outletSummary[outletId]) {
      dispatchedCell.innerText = outletSummary[outletId].dispatched;
      collectedCell.innerText = outletSummary[outletId].collected;
    } else {
      dispatchedCell.innerText = 0;
      collectedCell.innerText = 0;
    }
  });

  function refreshCompletedTable() {
    const completedBody = document.getElementById("completedBody");
    completedBody.innerHTML = "";
    completedOutlets.forEach((item, index) => {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${index + 1}</td>
        <td>${item.outlet_name}</td>
        <td>${item.dispatched}</td>
        <td>${item.collected}</td>
        <td><button class="removeBtn btn btn-sm btn-danger" data-index="${index}">Remove</button></td>
      `;
      completedBody.appendChild(row);
    });
    document.querySelectorAll(".removeBtn").forEach(btn => {
      btn.addEventListener("click", function() {
        const idx = parseInt(this.dataset.index);
        if (confirm("Remove this entry?")) {
          completedOutlets.splice(idx, 1);
          refreshCompletedTable();
        }
      });
    });
  }

  // Keyboard navigation
  function attachRowHandlers(row) {
    const outletSelect = row.querySelector(".outlet-select");
    const dispatchInput = row.querySelector(".dispatch-add");
    const collectionInput = row.querySelector(".collection-add");
    const addBtn = row.querySelector("#addBtn");
    const fields = [outletSelect, dispatchInput, collectionInput, addBtn];

    fields.forEach((el, idx) => {
      el.addEventListener("keydown", function(e) {
        if (["Enter","ArrowRight"].includes(e.key)) {
          e.preventDefault();
          const next = fields[idx + 1];
          if (next) {
            next.focus();
            if (next.id === "addBtn" && e.key === "Enter") {
              next.click(); // trigger Add on Enter
            }
          } else {
	   //postAllBtn.focus() jump to Post All if at end
            row.querySelector(".outlet-select").focus();
          }
        }
        if (e.key === "ArrowLeft") {
          e.preventDefault();
          const prev = fields[idx - 1];
          if (prev) prev.focus();
        }
        if (e.key === "ArrowDown") {
          e.preventDefault();
          const nextRow = row.nextElementSibling;
          if (nextRow) nextRow.querySelector(".outlet-select").focus();
          else postAllBtn.focus();
        }
        if (e.key === "ArrowUp") {
          e.preventDefault();
          const prevRow = row.previousElementSibling;
          if (prevRow) prevRow.querySelector(".outlet-select").focus();
        }
      });
    });
  }
  attachRowHandlers(tableBody.querySelector("tr"));

tableBody.addEventListener("click", function(e) {
  if (e.target && e.target.id === "addBtn") {
    const row = e.target.closest("tr");
    const outletSelect = row.querySelector(".outlet-select");
    const outletId = outletSelect.value;
    const outletName = outletSelect.options[outletSelect.selectedIndex].text;
    const dispatchVal = parseInt(row.querySelector(".dispatch-add").value || 0);
    const collectionVal = parseInt(row.querySelector(".collection-add").value || 0);

    if (!outletId || (dispatchVal + collectionVal) <= 0) {
      alert("Please select an outlet and enter valid dispatch/collection values.");
      return;
    }

    // Step 1: Ask if user wants to record entry at all
    const recordConfirm = confirm(`Record entry for ${outletName}?`);
    if (!recordConfirm) {
      resetTemplateRow(row);
      return; // abort if user says No
    }

    // Step 2: Check for duplicate
    const existing = completedOutlets.find(o => o.outlet_id === outletId);

    if (existing) {
      const mergeConfirm = confirm(
        `Outlet ${outletName} already exists.\nDo you want to add these values to the existing record?`
      );
      if (mergeConfirm) {
        existing.dispatched = parseInt(existing.dispatched) + dispatchVal;
        existing.collected = parseInt(existing.collected) + collectionVal;
        refreshCompletedTable();
      } else {
        resetTemplateRow(row);
        return; // abort if user says No
      }
    } else {
      // New entry
      completedOutlets.push({
        outlet_id: outletId,
        outlet_name: outletName,
        dispatched: dispatchVal,
        collected: collectionVal
      });
      refreshCompletedTable();
    }

    // Reset template row after success
    resetTemplateRow(row);
  }
});

// Utility function to reset template row
function resetTemplateRow(row) {
  const outletSelect = row.querySelector(".outlet-select");
  outletSelect.value = "";
  row.querySelector(".dispatch-add").value = "";
  row.querySelector(".collection-add").value = "";
  row.querySelector(".total-dispatched").innerText = "0";
  row.querySelector(".total-collected").innerText = "0";
}


 // Handle Post All
  postAllBtn.addEventListener("click", function() {
    if (completedOutlets.length === 0) {
      alert("No entries to post.");
      return;
    }

    fetch("/record/multiple", {   // ✅ updated route
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(completedOutlets)
    })
    .then(res => {
      if (!res.ok) throw new Error("Network response was not ok");
      return res.text(); // backend flashes + redirect, so just consume text
    })
    .then(() => {
      alert("Entries posted successfully!");
      completedOutlets = [];
      refreshCompletedTable();
      // Optionally redirect to dashboard after posting
      window.location.href = "/dashboard";
    })
    .catch(err => {
      console.error("Error posting entries:", err);
      alert("Failed to post entries.");
    });
  });
 }); 
</script>



<a href="{{ url_for('home') }}" class="btn btn-secondary mt-3">⬅️ Return to Home</a>

{% endblock %}
