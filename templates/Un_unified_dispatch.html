{% extends "layout.html" %}
{% block title %}Record Dispatch{% endblock %}

{% block content %}

<style>
  body {
    //background-color: red;
   background-color: #f28b82; /* soft red */
  }
</style>

<form method="post" class="card p-3"
      onsubmit="return confirmAndBusy(this,
        'Do you want to proceed dispatching ' 
        + document.querySelector('[name=crates_sent]').value 
        + ' crates to outlet ' 
        + document.querySelector('[name=outlet_name]').value 
        + ' by staff ' 
        + document.querySelector('[name=staff_name]').value + '?',
        'submitBtn');">
  <input type="hidden" name="cancelled" value="false">

  <h2>Record Dispatch</h2>

  <div class="mb-3">
    <label class="form-label">Outlet</label>
    <select name="outlet_name" id="outletSelect" class="form-select" required>
      <option value="" selected>-- Select Outlet --</option>
      {% for o in outlets %}
        <option value="{{ o }}">{{ o }}</option>
      {% endfor %}
    </select>
  </div>

  <div id="inventoryResult" class="highlight-label" data-process-type="dispatch"></div>

  <div class="mb-3">
    <label class="form-label">Crates Left here</label>
    <input type="number" name="crates_sent" class="form-control" required>
  </div>

  <!--div class="mb-3">
    <label class="form-label">Incharge (Staff Name)</label>
    <select name="staff_name" class="form-select" required>
      <option value="" selected>-- Select Staff --</option>
      {% for u in users %}
        <option value="{{ u }}">{{ u }}</option>
      {% endfor %}
    </select>
  </div-->

  <button type="submit" class="btn btn-primary" id="submitBtn">Submit Dispatch</button>
</form>

<div class="card mt-3">
  <div class="card-header">Recent Dispatches</div>
  <div class="card-body p-0">
    <table class="table table-sm mb-0">
      <thead class="table-light">
        <tr>
          <th>Date/Time</th>
          <th>Crates</th>
          <th>Recorded By</th>
        </tr>
      </thead>
      <tbody id="recentDispatches"></tbody>
    </table>
  </div>
</div>

<a href="{{ url_for('home') }}" class="btn btn-secondary mt-3">⬅️ Return to Home</a>


{% endblock %}
