<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Outlet Dispatch/Collection Grid</title>
  <!-- AG-Grid styles -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-alpine.css">
  <!-- AG-Grid script -->
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #summaryPanel { margin-top: 20px; }
    #summaryPanel h4 { margin-bottom: 5px; }
  </style>
</head>
<body>

  <h2>Outlet Dispatch/Collection Entry</h2>
  <div id="outletGrid" class="ag-theme-alpine" style="height: 400px; width: 100%;"></div>

  <div id="summaryPanel">
    <h4>Completed Outlets</h4>
    <ul id="completedList"></ul>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const columnDefs = [
        { headerName: "Outlet", field: "outlet", editable: true, cellEditor: 'agSelectCellEditor',
          cellEditorParams: { values: ["Outlet A", "Outlet B", "Outlet C"] } },
        { headerName: "Dispatched", field: "dispatch", editable: true, type: 'numericColumn' },
        { headerName: "Collected", field: "collection", editable: true, type: 'numericColumn' },
        { headerName: "Total", valueGetter: params => (params.data.dispatch || 0) + (params.data.collection || 0) }
      ];

      const gridOptions = {
        columnDefs: columnDefs,
        rowData: [{}], // start with one empty row
        defaultColDef: {
          flex: 1,
          resizable: true
        },
        stopEditingWhenCellsLoseFocus: true,
        onCellValueChanged: function(event) {
          const row = event.data;
          const dispatchVal = parseInt(row.dispatch || 0);
          const collectionVal = parseInt(row.collection || 0);

          // ✅ Rule: outlet selected AND (dispatch+collection) > 0
          if (row.outlet && (dispatchVal + collectionVal) > 0 && !row.completed) {
            row.completed = true;
            console.log(`Row completed for outlet ${row.outlet}`);

            // Add to summary panel
            updateSummary();

            // Append new empty row
            grid.api.applyTransaction({ add: [{}] });
          }
        }
      };

      const eGridDiv = document.querySelector('#outletGrid');
      const grid = agGrid.createGrid(eGridDiv, gridOptions);  // ✅ capture grid instance

      function updateSummary() {
        const allData = [];
        grid.api.forEachNode(node => {
          if (node.data.completed) allData.push(node.data);
        });
        const summaryDiv = document.getElementById("completedList");
        summaryDiv.innerHTML = allData.map(d =>
          `<li>Outlet ${d.outlet} | Dispatched: ${d.dispatch} | Collected: ${d.collection}</li>`
        ).join("");
      }
    });
  </script>

</body>
</html>
